# CI — PR/푸시 시 코드 품질 + 보안 게이트 (Shift-Left)
name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (lint · test · coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # 테스트용 PostGIS. 마이그레이션이 깨지지 않는지 + 읽기 API 계약을 실제 DB 로 검증.
    services:
      db:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: pawtrace
          POSTGRES_PASSWORD: pawtrace
          POSTGRES_DB: pawtrace
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pawtrace"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg2://pawtrace:pawtrace@localhost:5432/pawtrace
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Ruff (lint)
        run: ruff check .

      - name: Alembic migrate (스키마 회귀 방지)
        run: alembic upgrade head

      - name: Seed (멱등)
        run: python -m scripts.seed_db

      - name: Pytest (+coverage)
        run: |
          pip install pytest-cov
          pytest --cov=app --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  dockerfile-lint:
    name: Hadolint (Dockerfile lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile

  secret-scan:
    name: GitGuardian (secret scan)
    runs-on: ubuntu-latest
    env:
      GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: ggshield scan
        if: ${{ env.GITGUARDIAN_API_KEY != '' }}
        uses: GitGuardian/ggshield-action@v1
      - name: Skip notice
        if: ${{ env.GITGUARDIAN_API_KEY == '' }}
        run: echo "GITGUARDIAN_API_KEY 미설정 → 시크릿 스캔 건너뜀"

  sast:
    name: SonarQube (quality gate / SAST)
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        continue-on-error: true
      - name: Skip notice
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "SONAR_TOKEN 미설정 → SAST 건너뜀"
