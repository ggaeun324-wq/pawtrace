[tool.ruff]
line-length = 100
target-version = "py312"
# 자동 생성물(Alembic 마이그레이션)은 린트 대상에서 제외.
extend-exclude = ["migrations"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
# str,Enum 패턴과 typing.Generic 은 pydantic 호환을 위해 의도적으로 유지
ignore = ["UP042", "UP046"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
