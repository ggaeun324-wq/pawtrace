# Alembic 설정 (DB 스키마 버전관리).
# 실제 접속 URL 은 여기 하드코딩하지 않고 migrations/env.py 에서
# 환경변수(DATABASE_URL)로 주입합니다. (시크릿 분리)
[alembic]
script_location = migrations
prepend_sys_path = .
# 마이그레이션 파일명: 0001_initial 처럼 번호+설명으로 정렬되게.
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
