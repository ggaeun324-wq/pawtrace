# PawTrace 로컬 개발 스택
# 실행: docker compose up --build
#  - api:   FastAPI (시드 데이터로 즉시 동작)
#  - db:    PostgreSQL + PostGIS
#  - cache: Redis (P2부터 사용)
services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.example
    depends_on:
      - db
      - cache

  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: pawtrace
      POSTGRES_PASSWORD: pawtrace
      POSTGRES_DB: pawtrace
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
