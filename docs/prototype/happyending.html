<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PawTrace — 해피엔딩</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet" />
<style>
  :root{
    --bg:#FAF5EF; --card:#FFFFFF; --ink:#4A413B; --ink-soft:#94887F;
    --peach:#F3D2C0; --coral:#E8836A; --coral-deep:#D96E55; --mint:#CCE7DF;
    --mint-deep:#9BCFC0; --sun:#F2DEAE; --shadow:0 12px 28px rgba(200,140,110,.14);
    --shadow-sm:0 6px 15px rgba(150,120,100,.10); --r:26px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard',system-ui,sans-serif;background:
       radial-gradient(1200px 600px at 80% -10%, #F5E4D8 0%, transparent 60%),
       radial-gradient(900px 500px at 0% 10%, #E2F1EB 0%, transparent 55%),
       var(--bg);color:var(--ink);line-height:1.6;min-height:100vh}
  .wrap{max-width:1080px;margin:0 auto;padding:0 22px 60px}
  nav{display:flex;align-items:center;justify-content:space-between;padding:22px 0}
  .logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:22px;text-decoration:none;color:var(--ink)}
  .logo .paw{width:40px;height:40px;border-radius:14px;display:grid;place-items:center;
       background:linear-gradient(135deg,var(--peach),var(--coral));font-size:20px;box-shadow:var(--shadow-sm)}
  .navlinks{display:flex;gap:8px}
  .navlinks a{color:var(--ink-soft);text-decoration:none;font-weight:600;font-size:15px;
       padding:9px 16px;border-radius:999px;transition:.2s}
  .navlinks a:hover{background:#fff;color:var(--ink);box-shadow:var(--shadow-sm)}
  .navlinks a.active{background:var(--ink);color:#fff}
  .head{text-align:center;margin:14px 0 30px}
  .head .pill{display:inline-block;background:#fff;padding:6px 16px;border-radius:999px;
       box-shadow:var(--shadow-sm);font-weight:800;color:var(--coral-deep);margin-bottom:12px}
  .head h1{font-size:30px;font-weight:800;letter-spacing:-1px}
  .head p{color:var(--ink-soft);font-weight:600;margin-top:4px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px}
  .ecard{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;
       transition:.2s;text-decoration:none;color:inherit;display:flex;flex-direction:column}
  .ecard:hover{transform:translateY(-4px)}
  .ephoto{height:160px;background:linear-gradient(135deg,var(--peach),var(--mint));
       display:grid;place-items:center;font-size:54px;position:relative}
  .badge-done{position:absolute;top:12px;right:12px;background:#fff;color:var(--coral-deep);
       font-weight:800;font-size:12px;padding:6px 12px;border-radius:999px;box-shadow:var(--shadow-sm)}
  .ebody{padding:18px 20px}
  .ebody h3{font-size:19px;font-weight:800}
  .ebody .meta{color:var(--ink-soft);font-size:13px;font-weight:600;margin:3px 0 10px}
  .ebody .story{font-size:14px;color:var(--ink);line-height:1.7}
  .empty{text-align:center;padding:60px 20px;color:var(--ink-soft);font-weight:600}
</style>
</head>
<body>
  <div class="wrap">
    <nav>
      <a class="logo" href="index.html"><span class="paw">🐾</span> PawTrace</a>
      <div class="navlinks">
        <a href="index.html">오늘의 친구</a>
        <a href="map.html">보호소 지도</a>
        <a class="active" href="happyending.html">해피엔딩</a>
        <a href="guide.html">입양 가이드</a>
      </div>
    </nav>

    <div class="head">
      <span class="pill">💌 Happy Endings</span>
      <h1>가족을 만난 아이들</h1>
      <p>PawTrace 를 통해 새 가족을 만난 강아지들의 따뜻한 이야기예요 <span style="color:var(--coral)">♥</span></p>
    </div>

    <div id="grid" class="grid"></div>
  </div>

<script src="api.js"></script>
<script>
  const { pawFetch, badge, dogMeta } = window.PawAPI;
  const grid = document.getElementById("grid");

  // 백엔드 없이도 보이는 데모 데이터
  const DEMO = [
    { id: 2, name: "초코", age_estimate: "추정 4살", breed_label: "푸들(추정)", gender: "male",
      is_neutered: true, story: "오래 기다린 초코는 따뜻한 가족을 만나 매일 산책을 즐기고 있어요." },
    { id: 3, name: "보리", age_estimate: "추정 3살", breed_label: "진도믹스(추정)", gender: "female",
      is_neutered: true, story: "겁이 많던 보리는 새 가족의 사랑으로 활발한 강아지가 되었답니다." },
    { id: 4, name: "구름", age_estimate: "추정 5살", breed_label: "말티즈(추정)", gender: "male",
      is_neutered: false, story: "구름이는 입양 후 첫 생일파티를 하며 행복한 하루를 보냈어요." },
  ];

  const EMOJI = ["🐶", "🐕", "🦮", "🐩"];

  function render(dogs) {
    if (!dogs.length) {
      grid.innerHTML = '<div class="empty">아직 해피엔딩 소식이 없어요. 곧 좋은 소식이 찾아올 거예요 🐾</div>';
      return;
    }
    grid.innerHTML = dogs
      .map(
        (d, i) => `
      <a class="ecard" href="passport.html?id=${d.id}">
        <div class="ephoto">${EMOJI[i % EMOJI.length]}<span class="badge-done">✓ 입양 완료</span></div>
        <div class="ebody">
          <h3>${d.name}</h3>
          <div class="meta">${dogMeta(d)}</div>
          <div class="story">${d.story || ""}</div>
        </div>
      </a>`
      )
      .join("");
  }

  // 먼저 데모로 그린 뒤, 백엔드 성공 시 실제 데이터로 교체
  render(DEMO);
  badge("loading");
  pawFetch("/dogs/happy-endings")
    .then((dogs) => {
      render(dogs);
      badge("live");
    })
    .catch(() => badge("demo"));
</script>
</body>
</html>
