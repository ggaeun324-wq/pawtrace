<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PawTrace — 입양 후기</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet" />
<link href="style.css" rel="stylesheet" />
<style>
  .story-wrap{display:grid;grid-template-columns:340px 1fr;gap:26px;align-items:start;margin-top:8px}
  .sphoto{border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);height:360px;position:relative;
    background:linear-gradient(135deg,var(--peach),var(--mint));display:grid;place-items:center;font-size:96px}
  .sphoto img{width:100%;height:100%;object-fit:cover}
  .sphoto .done-badge{position:absolute;top:14px;left:14px;background:#fff;color:var(--coral-deep);
    font-weight:800;font-size:13px;padding:7px 14px;border-radius:999px;box-shadow:var(--shadow-sm)}
  .sinfo h1{font-size:32px;letter-spacing:-1px}
  .sinfo .meta{color:var(--ink-soft);font-weight:600;margin-top:3px}
  .review{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow-sm);
    padding:24px 26px;margin-top:18px;position:relative}
  .review .quote{font-size:46px;line-height:.6;color:var(--peach-deep);font-family:Georgia,serif}
  .review h4{font-size:16px;margin:6px 0 8px;color:var(--coral-deep)}
  .review p{font-size:16px;color:var(--ink);line-height:1.8}
  .review .when{margin-top:12px;font-size:13px;font-weight:700;color:var(--ink-soft)}
  .story-lead{font-size:16px;color:var(--ink);line-height:1.85;margin-top:14px}
  @media(max-width:860px){.story-wrap{grid-template-columns:1fr}.sphoto{height:280px}}
  /* 지금은 어떻게 지내요 — 분기 타임라인 */
  .now-sec{margin-top:34px}
  .now-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
  .now-head h2{font-size:22px;font-weight:800}
  .now-write{background:linear-gradient(135deg,var(--mint-deep),#7fbfae);color:#fff;text-decoration:none;
       font-weight:800;font-size:14px;padding:10px 18px;border-radius:14px;box-shadow:var(--shadow-sm)}
  .qtimeline{position:relative;margin-top:20px;padding-left:30px}
  .qtimeline::before{content:"";position:absolute;left:9px;top:6px;bottom:6px;width:3px;
       background:linear-gradient(var(--peach),var(--mint-deep));border-radius:3px}
  .qentry{position:relative;margin-bottom:20px;background:var(--card);border-radius:20px;
       box-shadow:var(--shadow-sm);padding:16px 20px}
  .qentry::before{content:"🐾";position:absolute;left:-30px;top:16px;width:26px;height:26px;
       display:grid;place-items:center;font-size:15px;background:#fff;border-radius:50%;box-shadow:var(--shadow-sm)}
  .qentry .q{font-size:12px;font-weight:800;color:var(--coral-deep)}
  .qentry h3{font-size:17px;font-weight:800;margin:3px 0 6px}
  .qentry .photo{width:100%;max-height:300px;object-fit:cover;border-radius:14px;margin:6px 0}
  .qentry p{font-size:14.5px;color:var(--ink);white-space:pre-line;line-height:1.75}
  .qempty{color:var(--ink-soft);font-size:14.5px;padding:18px 4px}
</style>
</head>
<body>
<div class="wrap">
  <nav>
    <a class="logo" href="index.html"><span class="paw">🐾</span> PawTrace</a>
    <div class="navlinks">
      <a href="index.html">오늘의 친구</a>
      <a href="map.html">보호소 지도</a>
      <a class="active" href="happyending.html">해피엔딩</a>
      <a href="academy.html">아카데미</a>
      <a href="profile.html">내 준비</a>
      <a href="journey.html">반려생활</a>
      <a href="guide.html">입양 가이드</a>
    </div>
  </nav>

  <a class="back" href="happyending.html">← 해피ing 목록으로</a>

  <div class="story-wrap">
    <div class="sphoto" id="sPhoto">
      <span id="sEmoji">🐶</span>
      <span class="done-badge">✓ 입양 완료</span>
    </div>
    <div class="sinfo">
      <span class="badge"><span class="dot"></span> <span id="sShelter">보호소</span>에서 만난 가족</span>
      <h1 style="margin-top:10px" id="sName">강아지</h1>
      <div class="meta" id="sMeta"></div>
      <p class="story-lead" id="sStory"></p>

      <div class="review">
        <div class="quote">“</div>
        <h4>💌 입양 후기</h4>
        <p id="sReview">이 아이는 새 가족과 함께 행복한 하루하루를 보내고 있어요.</p>
        <div class="when" id="sWhen"></div>
      </div>
    </div>
  </div>

  <div class="now-sec">
    <div class="now-head">
      <h2>🌷 지금은 어떻게 지내요</h2>
      <a class="now-write" id="writeLink" href="journey.html">✍️ 분기 기록 남기기</a>
    </div>
    <p style="color:var(--ink-soft);font-weight:600;margin-top:6px" id="nowDesc">가족을 만난 뒤의 분기별 이야기예요 🐾</p>
    <div class="qtimeline" id="qtimeline"><div class="qempty">불러오는 중…</div></div>
  </div>

  <footer>
    <div class="note">⚖️ 입양 후기는 보호소·입양 가족이 공유한 내용을 바탕으로 하며, 출처를 함께 표시합니다.</div>
  </footer>
</div>

<script src="api.js"></script>
<script>
  (async function () {
    const { pawFetch, badge, dogMeta, fmtDate } = window.PawAPI;
    const id = new URLSearchParams(location.search).get("id") || 2;
    const EMOJI = ["🐶", "🐕", "🦮", "🐩"];
    document.getElementById("sEmoji").textContent = EMOJI[(Number(id) || 0) % EMOJI.length];

    badge("loading");
    try {
      const d = await pawFetch("/dogs/" + id + "/passport");

      document.getElementById("sName").textContent = d.name;
      document.getElementById("sMeta").textContent = dogMeta(d);
      document.getElementById("sShelter").textContent = d.shelter_name || "보호소";
      if (d.story) document.getElementById("sStory").textContent = d.story;
      if (d.thumbnail_url) {
        document.getElementById("sPhoto").innerHTML =
          '<img src="' + d.thumbnail_url + '" onerror="this.remove()">' +
          '<span class="done-badge">✓ 입양 완료</span>';
      }

      // '입양 완료' 이벤트를 후기로 사용
      const adopted = (d.events || []).find((e) => e.event_type === "adopted");
      if (adopted) {
        if (adopted.memo) document.getElementById("sReview").textContent = adopted.memo;
        document.getElementById("sWhen").textContent =
          "입양 완료 · " + fmtDate(adopted.event_date);
      }
      badge("live");
    } catch (e) {
      badge("demo");
    }

    // 지금은 어떻게 지내요 — 분기별 반려생활 기록(공개 타임라인)
    loadNow(id);
  })();

  async function loadNow(id) {
    const { pawFetch } = window.PawAPI;
    const box = document.getElementById("qtimeline");
    function esc(s){ return (s||"").replace(/[&<>"]/g,(c)=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
    try {
      const entries = await pawFetch("/journey/dog/" + id);
      if (!entries || !entries.length) {
        box.innerHTML = '<div class="qempty">아직 분기별 기록이 없어요. 가족의 첫 이야기를 기다리고 있어요 🐾</div>';
        return;
      }
      box.innerHTML = entries.map((e) => `
        <div class="qentry">
          <div class="q">${esc(e.quarter_label) || "기록"} · 🧡 응원 ${e.cheers || 0}</div>
          <h3>${esc(e.title)}</h3>
          ${e.photo_url ? `<img class="photo" src="${e.photo_url}" onerror="this.remove()">` : ""}
          <p>${esc(e.body)}</p>
        </div>`).join("");
    } catch (err) {
      box.innerHTML = '<div class="qempty">기록을 불러오지 못했어요.</div>';
    }
  }
</script>
</body>
</html>
