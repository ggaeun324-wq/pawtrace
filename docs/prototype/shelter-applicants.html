<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PawTrace — 입양 신청자 검토 (보호소)</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet" />
<style>
  :root{
    --bg:#FAF5EF; --card:#FFFFFF; --ink:#4A413B; --ink-soft:#94887F;
    --peach:#F3D2C0; --coral:#E8836A; --coral-deep:#D96E55; --mint:#CCE7DF;
    --mint-deep:#9BCFC0; --sun:#F2DEAE; --lilac:#E2D5F1; --shadow:0 12px 28px rgba(200,140,110,.14);
    --shadow-sm:0 6px 15px rgba(150,120,100,.10); --r:26px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard',system-ui,sans-serif;background:
       radial-gradient(1200px 600px at 80% -10%, #F5E4D8 0%, transparent 60%),
       radial-gradient(900px 500px at 0% 10%, #E2F1EB 0%, transparent 55%),
       var(--bg);color:var(--ink);line-height:1.6;min-height:100vh}
  .wrap{max-width:820px;margin:0 auto;padding:0 22px 60px}
  nav{display:flex;align-items:center;justify-content:space-between;padding:22px 0}
  .logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:22px;text-decoration:none;color:var(--ink)}
  .logo .paw{width:40px;height:40px;border-radius:14px;display:grid;place-items:center;
       background:linear-gradient(135deg,var(--peach),var(--coral));font-size:20px;box-shadow:var(--shadow-sm)}
  .navlinks{display:flex;gap:8px;flex-wrap:wrap}
  .navlinks a{color:var(--ink-soft);text-decoration:none;font-weight:600;font-size:15px;
       padding:9px 16px;border-radius:999px;transition:.2s}
  .navlinks a:hover{background:#fff;color:var(--ink);box-shadow:var(--shadow-sm)}
  .navlinks a.active{background:var(--ink);color:#fff}
  .head{text-align:center;margin:14px 0 8px}
  .head .pill{display:inline-block;background:var(--lilac);padding:6px 16px;border-radius:999px;
       box-shadow:var(--shadow-sm);font-weight:800;color:#6b4ea3;margin-bottom:12px}
  .head h1{font-size:28px;font-weight:800;letter-spacing:-1px}
  .head p{color:var(--ink-soft);font-weight:600;margin-top:4px;font-size:14.5px}
  .notice{background:#FFF6EE;border:1px dashed #EAD7C6;border-radius:16px;padding:13px 16px;
       font-size:12.8px;color:var(--ink-soft);line-height:1.55;margin:16px 0 6px;text-align:center}
  .card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:22px;margin-top:18px}
  .arow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .arow .nm{font-weight:800;font-size:18px}
  .badge{font-weight:800;font-size:12px;padding:5px 12px;border-radius:999px}
  .b-sub{background:var(--sun);color:#9a7a2e}
  .b-rev{background:var(--mint);color:#2f7d68}
  .b-app{background:#DDEBFF;color:#3a6fae}
  .b-rej{background:#F1E0DA;color:#a8705f}
  .dog{margin-left:auto;font-size:13px;color:var(--ink-soft);font-weight:700}
  .msg{background:#F8F1EA;border-radius:14px;padding:11px 15px;font-size:13.5px;margin-bottom:14px}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
  @media(max-width:560px){.stats{grid-template-columns:repeat(2,1fr)}}
  .stat{background:#FBF6F0;border-radius:14px;padding:12px;text-align:center}
  .stat .v{font-weight:800;font-size:19px;color:var(--coral-deep)}
  .stat .k{font-size:11.5px;color:var(--ink-soft);font-weight:700;margin-top:2px}
  .ai-note{background:#F3F8F6;border:1px dashed #CDE3DB;border-radius:16px;padding:13px 16px;
       font-size:13px;color:#3f6b5e;line-height:1.55;margin-bottom:14px}
  .ai-note b{color:#2f7d68}
  .actions{display:flex;gap:10px;flex-wrap:wrap}
  .btn{border:none;cursor:pointer;font-family:inherit;font-weight:800;font-size:14px;
       padding:11px 18px;border-radius:14px;transition:.18s transform;text-decoration:none;display:inline-block}
  .btn:hover{transform:translateY(-2px)}
  .btn-primary{background:linear-gradient(135deg,var(--coral),var(--coral-deep));color:#fff;box-shadow:var(--shadow-sm)}
  .btn-ghost{background:#F3EEE8;color:var(--ink-soft)}
  .empty,.guard{text-align:center;background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);
       padding:44px 24px;margin-top:24px}
  .guard a{color:var(--coral-deep);font-weight:800;text-decoration:none}
</style>
</head>
<body>
  <div class="wrap">
    <nav>
      <a class="logo" href="index.html"><span class="paw">🐾</span> PawTrace</a>
      <div class="navlinks">
        <a href="index.html">오늘의 친구</a>
        <a href="map.html">보호소 지도</a>
        <a href="happyending.html">해피엔딩</a>
      </div>
    </nav>

    <!-- 권한 가드 -->
    <div id="guard" class="guard" style="display:none">
      <div style="font-size:40px">🔒</div>
      <h2 style="margin-top:10px">보호소 직원 전용 화면이에요</h2>
      <p style="color:var(--ink-soft);margin:8px 0 4px">보호소/관리자 계정으로 로그인해 주세요.</p>
      <a href="login.html">로그인 하러 가기 →</a>
    </div>

    <div id="content" style="display:none">
      <div class="head">
        <span class="pill">📋 Shelter Applicant Review</span>
        <h1>입양 신청자를 살펴봐요</h1>
        <p>신청자가 직접 준비한 활동을 모아서 보여드려요.</p>
      </div>
      <div class="notice">
        💛 PawTrace는 신청자를 합격/불합격으로 나누거나 점수화하지 않아요.
        아래는 <b>객관적인 준비 활동 요약</b>일 뿐이며, <b>최종 결정은 보호소에서</b> 직접 내려 주세요.
      </div>

      <div id="list"><div class="empty"><div style="font-size:34px">⏳</div><p style="margin-top:8px;color:var(--ink-soft)">불러오는 중…</p></div></div>
    </div>
  </div>

<script src="api.js"></script>
<script>
  const { pawSend, getUser } = window.PawAPI;
  const u = getUser();

  if (!u || (u.role !== "shelter_staff" && u.role !== "admin")) {
    document.getElementById("guard").style.display = "block";
  } else {
    document.getElementById("content").style.display = "block";
    loadApplicants();
  }

  const STATUS = {
    submitted: { label: "신청 접수", cls: "b-sub" },
    reviewing: { label: "검토 중", cls: "b-rev" },
    approved: { label: "승인", cls: "b-app" },
    rejected: { label: "보류", cls: "b-rej" },
  };

  function fmtDate(s) {
    try { return new Date(s).toLocaleDateString("ko-KR"); } catch (e) { return s; }
  }

  async function loadApplicants() {
    const box = document.getElementById("list");
    try {
      const items = await pawSend("/shelter/applicants", "GET", null, true);
      if (!items.length) {
        box.innerHTML = '<div class="empty"><div style="font-size:34px">🍃</div>' +
          '<p style="margin-top:8px;color:var(--ink-soft)">아직 입양 신청자가 없어요.</p></div>';
        return;
      }
      box.innerHTML = items.map(renderCard).join("");
    } catch (e) {
      box.innerHTML = '<div class="empty"><div style="font-size:34px">😢</div>' +
        '<p style="margin-top:8px;color:var(--ink-soft)">목록을 불러오지 못했어요.</p></div>';
    }
  }

  function renderCard(a) {
    const st = STATUS[a.status] || { label: a.status, cls: "b-sub" };
    return `
      <div class="card">
        <div class="arow">
          <span class="nm">${a.applicant_name}</span>
          <span class="badge ${st.cls}">${st.label}</span>
          <span class="dog">🐶 ${a.dog_name} 신청 · ${fmtDate(a.created_at)}</span>
        </div>
        ${a.message ? `<div class="msg">“${a.message}”</div>` : ""}
        <div class="stats">
          <div class="stat"><div class="v">${a.profile_completeness}%</div><div class="k">프로필 작성</div></div>
          <div class="stat"><div class="v">${a.checklist_completed}/${a.checklist_total}</div><div class="k">준비 체크리스트</div></div>
          <div class="stat"><div class="v">${a.education_count}</div><div class="k">교육 수료</div></div>
          <div class="stat"><div class="v">${a.education_count > 0 ? "🎓" : "—"}</div><div class="k">수료 배지</div></div>
        </div>
        <div class="ai-note">🤖 <b>활동 요약</b> · ${a.ai_summary}</div>
        <div class="actions">
          <a class="btn btn-primary" href="trust-profile.html?user_id=${a.user_id}">준비 활동 자세히 보기 →</a>
          <a class="btn btn-ghost" href="passport.html?dog=${a.dog_id}">강아지 여권 보기</a>
        </div>
      </div>`;
  }
</script>
</body>
</html>
